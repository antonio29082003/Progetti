<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API esterni</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="flex flex-col items-center">
        <h1 class="text-xl font-bold my-10">Dog's breeds</h1>
        <select class="text-center w-100 h-20" name="breeds" id="breeds">
            <option value="">Select</option>
        </select>
        <div id="container" class="flex flex-wrap m-10 p-10 gap-4"></div>
    </div>
    <script>
        const select = document.querySelector("#breeds")
        const container = document.querySelector("#container")

        fetch("https://dog.ceo/api/breeds/list/all")
            .then(response => response.json())
            .then(data => {
                const obj = data.message
                Object.keys(obj).forEach(key => {
                    if (obj[key].length === 0) {
                        createOption(key)
                    } else {
                        obj[key].forEach(element => {
                            createOption(`${key}/${element}`)
                        })
                    }
                })
                caricaDati(select.value)
            })

        select.addEventListener("change", (e) => {
            while (container.firstChild) {
                container.removeChild(container.firstChild)
            }
            caricaDati(e.target.value)
        })

        function createOption(value) {
            const option = document.createElement("option")
            option.value = value
            option.appendChild(document.createTextNode(value))
            select.appendChild(option)
        }

        function caricaDati(breed) {
            if (breed == "") return
            fetch(`https://dog.ceo/api/breed/${breed}/images`)
                .then(response => response.json())
                .then(data => {
                    console.log(data)
                    generateCard(data.message)
                })

        }

        function generateCard(photos) {
            photos.sort(() => Math.random() - 0.5)
            photos.forEach(photo => {
                const card = document.createElement("div")
                card.className = "rounded-xl shadow-xl text-xl bg.white h-[200px] w-[200px] bg-cover"
                card.style.backgroundImage = `url(${photo})`
                card.style.background
                container.appendChild(card)
            })
        }
    </script>
</body>

</html>
